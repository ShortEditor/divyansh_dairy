<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Dump Pro</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* Container */
.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

/* Title */
h1 {
  text-align: center;
  font-size: 1.8rem;
  background: linear-gradient(90deg, #22c55e, #38bdf8);
  -webkit-background-clip: text;
  color: transparent;
}

.subtitle {
  text-align: center;
  font-size: 14px;
  color: #94a3b8;
}

/* Input */
textarea {
  width: 100%;
  height: 120px;
  border-radius: 12px;
  border: none;
  padding: 12px;
  font-size: 15px;
  background: #020617;
  color: white;
}

/* Category */
select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
}

/* Buttons */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  font-size: 14px;
}

.save { background: #22c55e; }
.clear { background: #f59e0b; }

/* Search */
input {
  width: 100%;
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* Idea cards */
.idea-box {
  background: #020617;
  padding: 12px;
  margin-top: 12px;
  border-radius: 12px;
}

.time {
  font-size: 11px;
  color: #94a3b8;
}

.category {
  font-size: 11px;
  color: #38bdf8;
}

.actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.actions button {
  flex: 1;
  font-size: 12px;
  padding: 8px;
}

.delete { background: #ef4444; }
.edit { background: #3b82f6; }

/* Stats */
.stats {
  margin-top: 10px;
  font-size: 13px;
  color: #22c55e;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <h1>🧠 Mind Dump</h1>
  <p class="subtitle">Clear your mind. Sleep better.</p>

  <textarea id="idea" placeholder="Write your thoughts..."></textarea>

  <select id="category">
    <option>Idea</option>
    <option>Stress</option>
    <option>Goal</option>
  </select>

  <div class="buttons">
    <button class="save" onclick="saveIdea()">Save</button>
    <button class="clear" onclick="clearMind()">Clear</button>
  </div>

  <div class="stats" id="stats"></div>

  <input type="text" id="search" placeholder="Search..." onkeyup="displayIdeas()">

  <div id="ideasList"></div>

</div>

<script>

window.onload = displayIdeas;

function saveIdea() {
  let text = document.getElementById("idea").value.trim();
  let category = document.getElementById("category").value;

  if(text === "") return;

  let ideas = JSON.parse(localStorage.getItem("ideas")) || [];

  ideas.unshift({
    text,
    category,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("ideas", JSON.stringify(ideas));

  document.getElementById("idea").value = "";
  displayIdeas();
}

function displayIdeas() {
  let ideas = JSON.parse(localStorage.getItem("ideas")) || [];
  let search = document.getElementById("search").value.toLowerCase();

  let container = document.getElementById("ideasList");
  container.innerHTML = "";

  let filtered = ideas.filter(i => i.text.toLowerCase().includes(search));

  document.getElementById("stats").innerText =
    "Total: " + filtered.length;

  filtered.forEach((idea, index) => {
    let div = document.createElement("div");
    div.className = "idea-box";

    div.innerHTML = `
      <p contenteditable="false" id="text-${index}">${idea.text}</p>
      <div class="category">${idea.category}</div>
      <div class="time">${idea.time}</div>
      <div class="actions">
        <button class="edit" onclick="editIdea(${index})">Edit</button>
        <button class="delete" onclick="deleteIdea(${index})">Delete</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function deleteIdea(index) {
  let ideas = JSON.parse(localStorage.getItem("ideas")) || [];
  ideas.splice(index, 1);
  localStorage.setItem("ideas", JSON.stringify(ideas));
  displayIdeas();
}

function editIdea(index) {
  let el = document.getElementById("text-" + index);

  if(el.isContentEditable) {
    el.contentEditable = false;
    let ideas = JSON.parse(localStorage.getItem("ideas"));
    ideas[index].text = el.innerText;
    localStorage.setItem("ideas", JSON.stringify(ideas));
  } else {
    el.contentEditable = true;
    el.focus();
  }
}

function clearMind() {
  document.getElementById("idea").value = "";
}

</script>

</body>
</html>
